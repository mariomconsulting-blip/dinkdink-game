<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DinkDink">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>DinkDink.org - Play Pickleball Online</title>
    
    <style>
        /* ==========================================
           DinkDink.org - Premium Court UI Engine
           ========================================== */

        :root {
            --court-blue: #0077c8;
            --court-green: #22c55e;
            --neon-green: #39ff14;
            --neon-orange: #ff5e00;
            --text-dark: #0f172a;
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            
            /* Authentic Acrylic Sport Court Background Layout */
            background-color: var(--court-blue);
            background-image: 
                /* White Court Sidelines / Kitchen Line Accents */
                linear-gradient(90deg, rgba(255,255,255,0.15) 2px, transparent 2px),
                linear-gradient(0deg, rgba(255,255,255,0.15) 2px, transparent 2px),
                /* Dynamic lighting gradient to simulate an outdoor stadium light drop */
                radial-gradient(circle at 50% 30%, rgba(255,255,255,0.2) 0%, rgba(15,23,42,0.4) 100%);
            background-size: 100% 100%, 100% 100%, auto;
            background-position: center;

            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        /* --- Top Navigation Bar --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.6);
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo-area {
            text-align: center;
            padding: 15px 0 5px 0;
        }

        .logo-area h1 { 
            margin: 0; 
            font-size: 36px; 
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--text-light);
            text-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .live-counter { 
            color: var(--neon-green); 
            font-weight: 800; 
            font-size: 14px; 
            margin-top: 4px; 
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* --- Video Arena Container --- */
        .preview-container {
            flex: 1;
            padding: 10px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .game-preview-video {
            width: 100%;
            max-height: 38vh;
            border-radius: 24px;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.5);
            background-color: rgba(15, 23, 42, 0.8);
        }

        .chat-bubble {
            position: absolute;
            bottom: -5px;
            background: #ffffff;
            color: var(--text-dark);
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.3);
            animation: bounce 2.5s infinite;
            border: 2px solid var(--text-dark);
            z-index: 10;
        }

        /* --- Authentic Vector Paddle Controls --- */
        .action-area {
            padding: 20px 20px 35px 20px;
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }

        .paddle-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            max-width: 160px;
            transition: transform 0.1s ease;
        }

        .paddle-wrapper:active {
            transform: scale(0.92) translateY(4px);
        }

        .paddle-svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 12px 12px rgba(0,0,0,0.4));
        }

        /* High Visibility Interactive Overlays Centered on Paddle Face */
        .paddle-text-overlay {
            position: absolute;
            top: 28%; /* Keeps text centered directly inside the wide paddle head face */
            width: 85%;
            text-align: center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .paddle-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .paddle-title {
            font-size: 14px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Strict Legibility Contrast Profiles */
        .btn-online .paddle-title { color: #050b11; }
        .btn-ai .paddle-title { color: #ffffff; }

        /* --- High Contrast Bottom Utility Grid --- */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 14px 10px calc(14px + env(safe-area-inset-bottom));
            background: #0f172a;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item { 
            font-size: 12px; 
            font-weight: 700;
            color: var(--text-muted); 
            text-align: center; 
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .nav-item:hover, .nav-item.active {
            color: #ffffff;
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer;">☰</span>
        <span style="font-weight: 700; letter-spacing: 0.5px;">dinkdink.org</span>
        <span style="font-size: 20px; cursor: pointer;">⚙️</span>
    </div>

    <div class="logo-area">
        <h1>DINK DINK!</h1>
        <div class="live-counter">🟢 PLAYERS ONLINE NOW</div>
    </div>

    <div class="preview-container">
        <video class="game-preview-video" autoplay loop muted playsinline>
            <source src="gameplay-preview.mp4" type="video/mp4">
        </video>
        <div class="chat-bubble">Nice dink shot! 💥</div>
    </div>

    <div class="action-area">
        
        <div class="paddle-wrapper btn-online" onclick="console.log('Matchmaking initialized...')">
            <svg class="paddle-svg" viewBox="0 0 130 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M 15,65 C 15,15 115,15 115,65 L 110,135 C 110,145 95,150 85,152 L 85,195 C 85,198 45,198 45,195 L 45,152 C 35,150 20,145 20,135 Z" fill="#1e293b" />
                <path d="M 19,65 C 19,21 111,21 111,65 L 106,133 C 106,141 93,146 81,147 L 81,152 L 49,152 L 49,147 C 37,146 24,141 24,133 Z" fill="#39ff14" />
                <path d="M 49,152 L 81,152 L 78,194 C 78,196 52,196 52,194 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
                <line x1="50" y1="162" x2="80" y2="166" stroke="#e2e8f0" stroke-width="1.5" />
                <line x1="51" y1="172" x2="79" y2="176" stroke="#e2e8f0" stroke-width="1.5" />
                <line x1="51" y1="182" x2="79" y2="186" stroke="#e2e8f0" stroke-width="1.5" />
            </svg>
            <div class="paddle-text-overlay">
                <span class="paddle-icon">🏓</span>
                <span class="paddle-title">Online<br>Multi</span>
            </div>
        </div>

        <div class="paddle-wrapper btn-ai" onclick="console.log('AI Engine loading...')">
            <svg class="paddle-svg" viewBox="0 0 130 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M 15,65 C 15,15 115,15 115,65 L 110,135 C 110,145 95,150 85,152 L 85,195 C 85,198 45,198 45,195 L 45,152 C 35,150 20,145 20,135 Z" fill="#1e293b" />
                <path d="M 19,65 C 19,21 111,21 111,65 L 106,133 C 106,141 93,146 81,147 L 81,152 L 49,152 L 49,147 C 37,146 24,141 24,133 Z" fill="#ff5e00" />
                <path d="M 49,152 L 81,152 L 78,194 C 78,196 52,196 52,194 Z" fill="#334155" stroke="#0f172a" stroke-width="1" />
                <line x1="50" y1="162" x2="80" y2="166" stroke="#1e293b" stroke-width="1.5" />
                <line x1="51" y1="172" x2="79" y2="176" stroke="#1e293b" stroke-width="1.5" />
                <line x1="51" y1="182" x2="79" y2="186" stroke="#1e293b" stroke-width="1.5" />
            </svg>
            <div class="paddle-text-overlay">
                <span class="paddle-icon">🤖</span>
                <span class="paddle-title">VS. AI<br>Challenge</span>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active">
            <span class="nav-icon">🏆</span><br>Ranks
        </div>
        <div class="nav-item">
            <span class="nav-icon">🎨</span><br>My Paddle
        </div>
        <div class="nav-item">
            <span class="nav-icon">🌐</span><br>Community
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('PWA Service Worker running smoothly.', reg))
                    .catch(err => console.error('PWA Boundary Failure:', err));
            });
        }
    </script>
</body>
</html>
