<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DinkDink">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>DinkDink.org - Play Pickleball Online</title>
    
    <style>
        /* ==========================================
           DinkDink.org - Sunlight-Optimized Mobile UI Engine
           ========================================== */

        :root {
            --court-blue: #0077c8;
            --court-green: #22c55e;
            --neon-green: #39ff14;
            --neon-orange: #ff5e00;
            --stark-black: #000000;
            --stark-white: #ffffff;
            --text-muted: #cbd5e1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
            color: var(--stark-white);
            display: flex;
            flex-direction: column;
            
            /* Dynamic Viewport height constraint to defeat mobile browser toolbars */
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            
            /* High-contrast court background layout */
            background-color: var(--court-blue);
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.12) 2px, transparent 2px),
                linear-gradient(0deg, rgba(255,255,255,0.12) 2px, transparent 2px);
            background-size: 100% 100%;
            background-position: center;

            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        /* --- System Header Line --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--stark-black);
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        /* --- Stacked Header Area --- */
        .header-titles {
            text-align: center;
            padding: 8px 0 4px 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-titles h1 { 
            margin: 0; 
            font-size: 28px; 
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--stark-white);
            text-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .live-counter { 
            color: var(--neon-green); 
            font-weight: 900; 
            font-size: 13px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tagline {
            color: var(--stark-white);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            font-style: italic;
            text-transform: capitalize;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* --- NEW: Optimum Vertical Stack Layout Engine --- */
        .main-layout {
            display: flex;
            flex-direction: column; /* Stacks everything vertically */
            flex: 1; 
            padding: 8px 15px;
            gap: 12px;
            min-height: 0; 
            align-items: center;
            justify-content: space-between;
        }

        /* Prominent, Well-Anchored Court Frame occupying maximum available space */
        .arena-container {
            width: 100%;
            max-width: 340px; /* Keeps it tight and realistic on large screens */
            flex: 1; /* Automatically consumes available vertical space */
            position: relative;
            border-radius: 20px;
            border: 4px solid var(--stark-white);
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
            background-color: var(--stark-black);
            overflow: visible; /* Crucial for chat bubble popout */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0; /* Safeguard for flex child image shrinking */
        }

        .game-preview-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Locks layout proportions perfectly without cropping */
            border-radius: 16px; 
        }

        /* Anchored Overlay Chat Bubble */
        .chat-bubble {
            position: absolute;
            bottom: -10px; 
            left: 50%;
            transform: translateX(-50%); 
            background: var(--stark-white);
            color: var(--stark-black);
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 12px;
            box-shadow: 0px 5px 12px rgba(0,0,0,0.4);
            border: 3px solid var(--stark-black);
            z-index: 5;
            white-space: nowrap; 
        }

        /* Bottom Row: Horizontal Stacking of Control Paddles */
        .paddles-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: row; /* Horizontal row beneath court */
            justify-content: space-around; 
            align-items: flex-start;
            padding-bottom: 5px;
        }

        .paddle-wrapper {
            width: 42%;
            max-width: 105px; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .paddle-wrapper:active {
            transform: scale(0.92) translateY(2px);
        }

        .paddle-svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.4));
        }

        /* Paddle Face Text Format Settings */
        .paddle-text-overlay {
            position: absolute;
            top: 18%; 
            width: 100%;
            padding: 0 4px;
            box-sizing: border-box;
            text-align: center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .paddle-icon {
            font-size: 14px;
            margin-bottom: 1px;
        }

        .paddle-row-main {
            font-size: 9.5px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: 0.1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .paddle-row-sub {
            font-size: 8px;
            font-weight: 800;
            line-height: 1.2;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Visibility Themes */
        .btn-online .paddle-row-main { color: #000000; }
        .btn-online .paddle-row-sub { color: #000000; font-weight: 900; }
        
        .btn-ai .paddle-row-main { color: var(--stark-white); text-shadow: 0px 1.5px 3px rgba(0,0,0,0.7); }
        .btn-ai .paddle-icon { filter: drop-shadow(0px 0px 6px rgba(255, 255, 255, 1)); }

        /* --- Bottom Navigation Dock --- */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 10px;
            background: var(--stark-black); 
            border-top: 3px solid rgba(255, 255, 255, 0.2);
        }

        .nav-item { 
            font-size: 12px; 
            font-weight: 900;
            color: var(--text-muted); 
            text-align: center; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item.active {
            color: var(--neon-green);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
            display: inline-block;
        }

        /* --- Footer Link Strip --- */
        .page-footer {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; 
            gap: 4px 10px;
            background-color: var(--stark-black);
            border-top: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            font-size: 8px; 
            font-weight: 700;
            padding-top: 8px;
            padding-bottom: calc(14px + env(safe-area-inset-bottom)); 
        }

        .page-footer span {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            white-space: nowrap; 
        }

        .footer-divider {
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <span style="font-size: 18px; cursor: pointer;">☰</span>
        <span style="font-weight: 700; letter-spacing: 0.5px;">dinkdink.org</span>
        <span style="font-size: 18px; cursor: pointer;">⚙️</span>
    </div>

    <div class="header-titles">
        <h1>DINK DINK!</h1>
        <div class="live-counter">🟢 PLAY ONLINE NOW</div>
        <div class="tagline">Play Anytime Anywhere</div>
    </div>

    <div class="main-layout">
        
        <div class="arena-container">
            <img class="game-preview-image" src="dinkcourt2.png" alt="DinkDink Gameplay Arena Preview">
            <div class="chat-bubble">Nice dink shot! 💥</div>
        </div>

        <div class="paddles-container">
            
            <div class="paddle-wrapper btn-online" onclick="console.log('Instant queue activated')">
                <svg class="paddle-svg" viewBox="0 0 130 200" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 15,65 C 15,15 115,15 115,65 L 110,135 C 110,145 95,150 77,152 L 77,195 C 77,198 53,198 53,195 L 53,152 C 35,150 20,145 20,135 Z" fill="#000000" stroke="#ffffff" stroke-width="1" />
                    <path d="M 19,65 C 19,21 111,21 111,65 L 106,133 C 106,141 93,146 73,147 L 73,152 L 57,152 L 57,147 C 37,146 24,141 24,133 Z" fill="#39ff14" />
                    <path d="M 57,152 L 73,152 L 71,194 C 71,196 59,196 59,194 Z" fill="#ffffff" stroke="#000000" stroke-width="1.5" />
                    <line x1="58" y1="162" x2="72" y2="166" stroke="#000000" stroke-width="1.5" />
                    <line x1="58" y1="172" x2="72" y2="176" stroke="#000000" stroke-width="1.5" />
                    <line x1="58" y1="182" x2="72" y2="186" stroke="#000000" stroke-width="1.5" />
                </svg>
                <div class="paddle-text-overlay">
                    <span class="paddle-icon">🏓</span>
                    <div class="paddle-row-main">Online Match</div>
                    <div class="paddle-row-sub">No Login</div>
                    <div class="paddle-row-sub">Needed</div>
                </div>
            </div>

            <div class="paddle-wrapper btn-ai" onclick="console.log('Practice drill track loaded')">
                <svg class="paddle-svg" viewBox="0 0 130 200" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 15,65 C 15,15 115,15 115,65 L 110,135 C 110,145 95,150 77,152 L 77,195 C 77,198 53,198 53,195 L 53,152 C 35,150 20,145 20,135 Z" fill="#000000" stroke="#ffffff" stroke-width="1" />
                    <path d="M 19,65 C 19,21 111,21 111,65 L 106,133 C 106,141 93,146 73,147 L 73,152 L 57,152 L 57,147 C 37,146 24,141 24,133 Z" fill="#ff5e00" />
                    <path d="M 57,152 L 73,152 L 71,194 C 71,196 59,196 59,194 Z" fill="#111827" stroke="#000000" stroke-width="1.5" />
                    <line x1="58" y1="162" x2="72" y2="166" stroke="#374151" stroke-width="1.5" />
                    <line x1="58" y1="172" x2="72" y2="176" stroke="#374151" stroke-width="1.5" />
                    <line x1="58" y1="182" x2="72" y2="186" stroke="#374151" stroke-width="1.5" />
                </svg>
                <div class="paddle-text-overlay" style="top: 25%;">
                    <span class="paddle-icon">🏓</span>
                    <div class="paddle-row-main">Practice</div>
                    <div class="paddle-row-main">Drill</div>
                </div>
            </div>

        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item">
            <span class="nav-icon">🌐</span><br>Community
        </div>
        <div class="nav-item">
            <span class="nav-icon">🎨</span><br>My Paddle
        </div>
        <div class="nav-item active">
            <span class="nav-icon">🏆</span><br>Ranks
        </div>
    </div>

    <div class="page-footer">
        <span>Terms of Use</span>
        <span class="footer-divider">|</span>
        <span>Privacy Policy</span>
        <span class="footer-divider">|</span>
        <span>Copyright © 2026 Adrien Marsden</span>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log(err));
            });
        }
    </script>
</body>
</html>
