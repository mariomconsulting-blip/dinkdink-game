<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DinkDink">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>DinkDink.org - Play Pickleball Online</title>
    
    <style>
        /* ==========================================
           DinkDink.org - Sunlight-Optimized Mobile UI Engine
           ========================================== */

        :root {
            --court-blue: #0077c8;
            --court-green: #22c55e;
            --neon-green: #39ff14;
            --neon-orange: #ff5e00;
            --stark-black: #000000;
            --stark-white: #ffffff;
            --text-muted: #cbd5e1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
            color: var(--stark-white);
            display: flex;
            flex-direction: column;
            
            /* Dynamic Viewport height constraint to defeat mobile browser toolbars */
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            
            /* High-contrast court background layout */
            background-color: var(--court-blue);
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.12) 2px, transparent 2px),
                linear-gradient(0deg, rgba(255,255,255,0.12) 2px, transparent 2px);
            background-size: 100% 100%;
            background-position: center;

            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        /* --- System Header Line --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--stark-black);
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        .logo-area {
            text-align: center;
            padding: 6px 0 0px 0;
        }

        .logo-area h1 { 
            margin: 0; 
            font-size: 32px; 
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--stark-white);
            text-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .live-counter { 
            color: var(--neon-green); 
            font-weight: 900; 
            font-size: 13px; 
            margin-top: 2px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- Graphics Window Arena Stage --- */
        .preview-container {
            flex: 1;
            /* WIDER ARENA: Margin reduced to allow full-width stretch */
            width: calc(100% - 16px); 
            margin: 10px auto 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 0; 
        }

        .arena-frame {
            width: 100%;
            height: 100%;
            /* TALLER ARENA: Allowed to stretch further down the page */
            max-height: 38vh; 
            border-radius: 20px;
            border: 4px solid var(--stark-white);
            box-shadow: 0px 12px 24px rgba(0, 0, 0, 0.5);
            background-color: var(--stark-black);
            
            /* Clips the rotated image so it stays perfectly inside the rounded borders */
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Render target for the 90-degree rotated court */
        .game-preview-image {
            position: absolute;
            width: 100vh; /* Scaled safely beyond the bounds of the box */
            height: 100vw; 
            transform: rotate(90deg); /* 90 DEGREE ROTATION APPLIED */
            object-fit: contain; 
        }

        .chat-bubble {
            position: absolute;
            bottom: -12px;
            background: var(--stark-white);
            color: var(--stark-black);
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 13px;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.4);
            border: 3px solid var(--stark-black);
            z-index: 5;
        }

        /* --- Middle Tagline Badge --- */
        .tagline-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 22px; 
            margin-bottom: -5px; 
            z-index: 10;
        }

        .tagline-badge {
            background-color: var(--stark-black);
            color: var(--stark-white);
            border: 2px solid var(--neon-green);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        /* --- Interactive Vector Paddles Frame --- */
        .action-area {
            /* Tighter padding allows the paddles to sit lower, making space for the bigger arena */
            padding: 10px 15px 15px 15px; 
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }

        .paddle-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            /* SMALLER PADDLES: Maximum scaling reduced to increase UI real estate above */
            max-width: 120px; 
            transition: transform 0.1s ease;
        }

        .paddle-wrapper:active {
            transform: scale(0.92) translateY(2px);
        }

        .paddle-svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.4));
        }

        /* Exact Text Grid Layout Transformations Inside Paddle Faces */
        .paddle-text-overlay {
            position: absolute;
            top: 20%; 
            width: 100%;
            padding: 0 8px;
            box-sizing: border-box;
            text-align: center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .paddle-icon {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .paddle-row-main {
            font-size: 11px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: 0.1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .paddle-row-sub {
            font-size: 9.5px;
            font-weight: 800;
            line-height: 1.2;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Enhanced High-Contrast Theme Settings for Outdoor Visibility */
        .btn-online .paddle-row-main { color: #000000; }
        .btn-online .paddle-row-sub { color: #000000; font-weight: 900; }
        
        .btn-ai .paddle-row-main { color: var(--stark-white); text-shadow: 0px 1.5px 3px rgba(0,0,0,0.7); }
        .btn-ai .paddle-icon { filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 1)); }

        /* --- Bottom Navigation Dock --- */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-top: 14px;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 14px;
            background: var(--stark-black); 
            border-top: 3px solid rgba(255, 255, 255, 0.2);
        }

        .nav-item { 
            font-size: 13px; 
            font-weight: 900;
            color: var(--text-muted); 
            text-align: center; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item.active {
            color: var(--neon-green);
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 2px;
            display: inline-block;
        }

        /* --- Dynamic Footer Strip: Terms, Policy, Copyright --- */
        .page-footer {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; 
            gap: 6px 10px;
            background-color: var(--stark-black);
            border-top: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            font-size: 8.5px; 
            font-weight: 700;
            padding-top: 12px;
            
            /* Safe area padding pushes text clear of mobile software overlays */
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); 
        }

        .page-footer span {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            white-space: nowrap; 
        }

        .footer-divider {
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer;">☰</span>
        <span style="font-weight: 700; letter-spacing: 0.5px;">dinkdink.org</span>
        <span style="font-size: 20px; cursor: pointer;">⚙️</span>
    </div>

    <div class="logo-area">
        <h1>DINK DINK!</h1>
        <div class="live-counter">🟢 PLAY ONLINE NOW</div>
    </div>

    <div class="preview-container">
        <div class="arena-frame">
            <img class="game-preview-image" src="dinkcourt1.jpg" alt="DinkDink Gameplay Arena Preview">
        </div>
        <div class="chat-bubble">Nice dink shot! 💥</div>
    </div>

    <div class="tagline-wrapper">
        <div class="tagline-badge">PLAY ANYTIME ANYWHERE</div>
    </div>

    <div class="action-area">
        
        <div class="paddle-wrapper btn-online" onclick="console.log('Instant queue activated')">
            <svg class="paddle-svg" viewBox="0 0 130 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M 15,65 C 15,15 115,15 115,65 L 110,135 C 110,145 95,150 77,152 L 77,195 C 77,198 53,198 53,195 L 53,152 C 35,150 20,145 20,135 Z" fill="#000000" stroke="#ffffff" stroke-width="1" />
                <path d="M 19,65 C 19,21 111,21 111,65 L 106,133 C 106,141 93,146 73,147 L 73,152 L 57,152 L 57,147 C 37,146 24,141 24,133 Z" fill="#39ff14" />
                <path d="M 57,152 L 73,152 L 71,194 C 71,196 59,196 59,194 Z" fill="#ffffff" stroke="#000000" stroke-width="1.5" />
                <line x1="58" y1="162" x2="72" y2="166" stroke="#000000" stroke-width="1.5" />
                <line x1="58" y1="172" x2="72" y2="176" stroke="#000000" stroke-width="1.5" />
                <line x1="58" y1="182" x2="72" y2="186" stroke="#000000" stroke-width="1.5" />
            </svg>
            <div class="paddle-text-overlay">
                <span class="paddle-icon">🏓</span>
                <div class="paddle-row-main">Online Match</div>
                <div class="paddle-row-sub">No Login</div>
                <div class="paddle-row-sub">Required</div>
            </div>
        </div>

        <div class="paddle-wrapper btn-ai" onclick="console.log('Practice drill track loaded')">
            <svg class="paddle-svg" viewBox="0 0 130 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M 15,65 C 15,15 115,15 115,65 L 110,135 C 110,145 95,150 77,152 L 77,195 C 77,198 53,198 53,195 L 53,152 C 35,150 20,145 20,135 Z" fill="#000000" stroke="#ffffff" stroke-width="1" />
                <path d="M 19,65 C 19,21 111,21 111,65 L 106,133 C 106,141 93,146 73,147 L 73,152 L 57,152 L 57,147 C 37,146 24,141 24,133 Z" fill="#ff5e00" />
                <path d="M 57,152 L 73,152 L 71,194 C 71,196 59,196 59,194 Z" fill="#111827" stroke="#000000" stroke-width="1.5" />
                <line x1="58" y1="162" x2="72" y2="166" stroke="#374151" stroke-width="1.5" />
                <line x1="58" y1="172" x2="72" y2="176" stroke="#374151" stroke-width="1.5" />
                <line x1="58" y1="182" x2="72" y2="186" stroke="#374151" stroke-width="1.5" />
            </svg>
            <div class="paddle-text-overlay" style="top: 25%;">
                <span class="paddle-icon">🏓</span>
                <div class="paddle-row-main">Practice</div>
                <div class="paddle-row-main">Drill</div>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item">
            <span class="nav-icon">🌐</span><br>Community
        </div>
        <div class="nav-item">
            <span class="nav-icon">🎨</span><br>My Paddle
        </div>
        <div class="nav-item active">
            <span class="nav-icon">🏆</span><br>Ranks
        </div>
    </div>

    <div class="page-footer">
        <span>Terms of Use</span>
        <span class="footer-divider">|</span>
        <span>Privacy Policy</span>
        <span class="footer-divider">|</span>
        <span>Copyright © 2026 Adrien Marsden</span>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log(err));
            });
        }
    </script>
</body>
</html>
