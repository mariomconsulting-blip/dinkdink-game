<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DinkDink">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>DinkDink.org - Play Pickleball Online</title>
    
    <style>
        /* ==========================================
           DinkDink.org - Sunlight-Optimized Mobile UI Layout
           ========================================== */

        :root {
            --court-blue: #0077c8;
            --neon-green: #39ff14;
            --neon-orange: #ff5e00;
            --stark-black: #000000;
            --stark-white: #ffffff;
            --text-muted: #e2e8f0; /* Ultra-bright gray for maximum outdoor utility contrast */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
            color: var(--stark-white);
            display: flex;
            flex-direction: column;
            
            /* Dynamic Viewport height constraint to defeat mobile browser toolbars */
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            
            /* Pure high-contrast acrylic court base colors */
            background-color: var(--court-blue);
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.2) 2px, transparent 2px),
                linear-gradient(0deg, rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 100% 100%;
            background-position: center;

            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        /* --- Top Browser Context Strip --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--stark-black); /* Solid black background for maximum readability outside */
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        .logo-area {
            text-align: center;
            padding: 8px 0 0px 0;
        }

        .logo-area h1 { 
            margin: 0; 
            font-size: 34px; 
            font-weight: 900;
            letter-spacing: 1.5px;
            color: var(--stark-white);
            text-shadow: 0 4px 6px rgba(0,0,0,0.6);
        }

        .live-counter { 
            color: var(--neon-green); 
            font-weight: 900; 
            font-size: 13px; 
            margin-top: 4px; 
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* --- Center Court Graphic Canvas Window --- */
        .preview-container {
            flex: 1;
            padding: 10px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .game-preview-image {
            width: 100%;
            height: 100%;
            max-height: 35vh;
            border-radius: 24px;
            object-fit: cover;
            border: 4px solid var(--stark-white); /* Thicker border to make the frame pop out under glare */
            box-shadow: 0px 15px 30px rgba(0, 0, 0, 0.6);
        }

        /* High-Contrast "Play Anytime Anywhere" Banner Ribbon */
        .marketing-ribbon {
            position: absolute;
            top: 25px;
            background: var(--stark-black);
            color: var(--stark-white);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid var(--neon-green);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .chat-bubble {
            position: absolute;
            bottom: -10px;
            background: var(--stark-white);
            color: var(--stark-black);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 13px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.4);
            border: 3px solid var(--stark-black);
            z-index: 10;
        }

        /* --- Vector Paddle Layout Controls --- */
        .action-area {
            padding: 15px 20px 20px 20px;
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }

        .paddle-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            max-width: 150px;
            transition: transform 0.1s ease;
        }

        .paddle-wrapper:active {
            transform: scale(0.92) translateY(4px);
        }

        .paddle-svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 10px 8px rgba(0,0,0,0.5));
        }

        /* Precise Text Layout Inside Paddle Faces */
        .paddle-text-overlay {
            position: absolute;
            top: 22%; 
            width: 82%;
            text-align: center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .paddle-icon {
            font-size: 22px;
            margin-bottom: 2px;
        }

        .paddle-title {
            font-size: 12px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .paddle-subtitle {
            font-size: 9px;
            font-weight: 800;
            line-height: 1.1;
            margin-top: 4px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* Crisp High Contrast Text Maps for Outdoor Glare Protection */
        .btn-online .paddle-title { color: #000000; }
        .btn-online .paddle-subtitle { color: #000000; font-weight: 900; }
        
        .btn-ai .paddle-title { color: var(--stark-white); text-shadow: 0px 2px 4px rgba(0,0,0,0.5); }

        /* --- Solid High-Contrast Bottom Utility Strip --- */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-top: 16px;
            padding-left: 10px;
            padding-right: 10px;
            /* Extra safety margin padding to clear ambient phone browser interface elements */
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            background: var(--stark-black); 
            border-top: 3px solid rgba(255, 255, 255, 0.2);
        }

        .nav-item { 
            font-size: 13px; 
            font-weight: 900;
            color: var(--text-muted); 
            text-align: center; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item.active {
            color: var(--neon-green); /* Green highlight indicator stands out instantly outdoors */
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 2px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <!-- 1. System Header Strip -->
    <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer;">☰</span>
        <span style="font-weight: 700; letter-spacing: 0.5px;">dinkdink.org</span>
        <span style="font-size: 20px; cursor: pointer;">⚙️</span>
    </div>

    <!-- 2. Brand Positioning Section -->
    <div class="logo-area">
        <h1>DINK DINK!</h1>
        <div class="live-counter">🟢 PLAYERS ONLINE NOW</div>
    </div>

    <!-- 3. Primary Graphics Hub Layer -->
    <div class="preview-container">
        <!-- Render target using the verbatim dink court AI.jpg file context -->
        <img class="game-preview-image" src="dink court AI.jpg" alt="DinkDink Gameplay Arena Preview">
        
        <!-- Stark marketing floating banner callout -->
        <div class="marketing-ribbon">Play anytime anywhere</div>
        
        <div class="chat-bubble">Nice dink shot! 💥</div>
    </div>

    <!-- 4. Conversion Action Matrix -->
    <div class="action-area">
        
        <!-- Left Paddle Button: Matchmaking Configuration -->
        <div class="paddle-wrapper btn-online" onclick="console.log('Online queue selected')">
            <svg class="paddle-svg" viewBox="0 0 130 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M 15,65 C 15,15 115,15 115,65 L 110,135 C 110,145 95,150 85,152 L 85,195 C 85,198 45,198 45,195 L 45,152 C 35,150 20,145 20,135 Z" fill="#000000" stroke="#ffffff" stroke-width="1" />
                <path d="M 19,65 C 19,21 111,21 111,65 L 106,133 C 106,141 93,146 81,147 L 81,152 L 49,152 L 49,147 C 37,146 24,141 24,133 Z" fill="#39ff14" />
                <path d="M 49,152 L 81,152 L 78,194 C 78,196 52,196 52,194 Z" fill="#ffffff" stroke="#000000" stroke-width="1.5" />
                <line x1="50" y1="162" x2="80" y2="166" stroke="#000000" stroke-width="1.5" />
                <line x1="51" y1="172" x2="79" y2="176" stroke="#000000" stroke-width="1.5" />
                <line x1="51" y1="182" x2="79" y2="186" stroke="#000000" stroke-width="1.5" />
            </svg>
            <div class="paddle-text-overlay">
                <span class="paddle-icon">🏓</span>
                <span class="paddle-title">Instant Match</span>
                <span class="paddle-subtitle">No Login Required</span>
            </div>
        </div>

        <!-- Right Paddle Button: Training Configuration -->
        <div class="paddle-wrapper btn-ai" onclick="console.log('Training track selected')">
            <svg class="paddle-svg" viewBox="0 0 130 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M 15,65 C 15,15 115,15 115,65 L 110,135 C 110,145 95,150 85,152 L 85,195 C 85,198 45,198 45,195 L 45,152 C 35,150 20,145 20,135 Z" fill="#000000" stroke="#ffffff" stroke-width="1" />
                <path d="M 19,65 C 19,21 111,21 111,65 L 106,133 C 106,141 93,146 81,147 L 81,152 L 49,152 L 49,147 C 37,146 24,141 24,133 Z" fill="#ff5e00" />
                <path d="M 49,152 L 81,152 L 78,194 C 78,196 52,196 52,194 Z" fill="#111827" stroke="#000000" stroke-width="1.5" />
                <line x1="50" y1="162" x2="80" y2="166" stroke="#374151" stroke-width="1.5" />
                <line x1="51" y1="172" x2="79" y2="176" stroke="#374151" stroke-width="1.5" />
                <line x1="51" y1="182" x2="79" y2="186" stroke="#374151" stroke-width="1.5" />
            </svg>
            <div class="paddle-text-overlay">
                <span class="paddle-icon">🤖</span>
                <span class="paddle-title" style="margin-top: 5px;">Practice Drill</span>
            </div>
        </div>

    </div>

    <!-- 5. Navigation Footer Dock -->
    <div class="bottom-nav">
        <div class="nav-item active">
            <span class="nav-icon">🏆</span><br>Ranks
        </div>
        <div class="nav-item">
            <span class="nav-icon">🎨</span><br>My Paddle
        </div>
        <div class="nav-item">
            <span class="nav-icon">🌐</span><br>Community
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('PWA execution profile successfully verified.', reg))
                    .catch(err => console.error('PWA fallback engine block:', err));
            });
        }
    </script>
</body>
</html>
